# HPDS Validation Test Configuration
# Points to poly repo ingested data for validation testing

SMALL_JOB_LIMIT=100
SMALL_TASK_THREADS=4
LARGE_TASK_THREADS=4
ID_BATCH_SIZE=1000

# Point to poly repo output directory containing ingested JavaBins
HPDS_DATA_DIRECTORY=/Users/thomas/IdeaProjects/dhdr-polyrepo-proto/output/

# Disable genomic processor for phenotype-only validation
HPDS_GENOMIC_DATA_DIRECTORY=/tmp/empty_genomic/

# Cache configuration optimized for validation
CACHE_SIZE=50
CHILD_CONCEPT_CACHE_SIZE=1000

# Disable file sharing for testing
enable_file_sharing=false

# Logging
logging.level.root=INFO
logging.level.edu.harvard.hms.dbmi.avillach.hpds=DEBUG
logging.level.org.springframework=WARN
